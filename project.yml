name: SubFlow
options:
  bundleIdPrefix: com.pinechou
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

packages:
  MoonshineSwift:
    url: https://github.com/moonshine-ai/moonshine-swift
    branch: main

targets:
  SubFlow:
    type: application
    platform: macOS
    sources:
      - SubFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pinechou.SubFlow
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: SubFlow/Resources/SubFlow.entitlements
        INFOPLIST_FILE: SubFlow/Resources/Info.plist
        CODE_SIGN_IDENTITY: "-"
        # DEVELOPMENT_TEAM is intentionally unset. The default `-` identity is
        # ad-hoc signing, which requires no team. When a contributor opens the
        # project in Xcode and hits Run, Xcode's Signing & Capabilities tab
        # lets them flip to automatic signing with their own Apple ID Personal
        # Team in one click — the choice lives in xcuserdata and is not
        # committed. CLI builds (`xcodebuild test` etc.) keep using ad-hoc so
        # CI and contributor machines with no signed-in Apple ID still pass.
      configs:
        Release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: MoonshineSwift
        product: MoonshineVoice
    entitlements:
      path: SubFlow/Resources/SubFlow.entitlements

  SubFlowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SubFlowTests
    dependencies:
      - target: SubFlow
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
